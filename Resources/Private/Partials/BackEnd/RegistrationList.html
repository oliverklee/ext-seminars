<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:be="http://typo3.org/ns/TYPO3/CMS/Backend/ViewHelpers"
      xmlns:core="http://typo3.org/ns/TYPO3/CMS/Core/ViewHelpers"
      data-namespace-typo3-fluid="true">
    <f:variable name="tableName" value="tx_seminars_attendances"/>
    <f:variable name="propertyLabelPrefix" value="backEndModule.events.property"/>
    <f:variable name="actionLabelPrefix" value="backEndModule.action"/>
    <f:variable name="deleteButtonTitle" value="{f:translate(key: '{actionLabelPrefix}.deleteRegistration')}"/>

    <table class="table table-hover table-striped">
        <thead>
            <tr>
                <th scope="col" colspan="2" class="nowrap">
                    <f:translate key="{propertyLabelPrefix}.uid"/>
                </th>
                <th scope="col" class="col-title col-responsive">
                    <f:translate key="{propertyLabelPrefix}.name"/>
                </th>
                <th scope="col" class="nowrap">
                    <f:translate key="{propertyLabelPrefix}.seats"/>
                </th>
                <f:if condition="{permissions.writeAccessToRegistrations}">
                    <th scope="col" class="col-control nowrap">&nbsp;</th>
                </f:if>
            </tr>
        </thead>
        <tbody>
            <f:for each="{registrations}" as="registration">
                <tr>
                    <td class="text-end text-right nowrap">
                        {registration.uid}
                    </td>
                    <td class="col-icon nowrap">
                        <core:iconForRecord table="{tableName}" row="{registration.rawData}"/>
                    </td>
                    <td class="col-title col-responsive">
                        <f:if condition="{permissions.writeAccessToRegistrations}">
                            <f:then>
                                <be:link.editRecord uid="{registration.uid}" table="{tableName}">
                                    {registration.user.name}
                                </be:link.editRecord>
                            </f:then>
                            <f:else>
                                {registration.user.name}
                            </f:else>
                        </f:if>
                    </td>
                    <td class="text-end text-right nowrap">
                        {registration.seats}
                    </td>
                    <f:if condition="{permissions.writeAccessToRegistrations}">
                        <td class="col-control nowrap">
                            <div class="btn-group" role="group">
                                <be:link.editRecord uid="{registration.uid}" table="{tableName}" class="btn btn-default"
                                                    title="{f:translate(key: '{actionLabelPrefix}.edit')}">
                                    <core:icon identifier="actions-open"/>
                                </be:link.editRecord>

                                <span class="btn btn-default disabled">
                                    <core:icon identifier="empty-empty"/>
                                </span>

                                <button type="button"
                                        class="btn btn-default t3js-record-delete"
                                        title="{deleteButtonTitle}"
                                        aria-label="{deleteButtonTitle}"
                                        aria-haspopup="dialog"
                                        data-button-ok-text="{deleteButtonTitle}"
                                        data-l10parent=""
                                        data-params="cmd[{tableName}][{registration.uid}][delete]=1"
                                        data-message="{f:translate(key: '{actionLabelPrefix}.deleteRegistrationConfirmation', arguments: {0: registration.title})}">
                                    <core:icon identifier="actions-delete"/>
                                </button>
                            </div>
                        </td>
                    </f:if>
                </tr>
            </f:for>
        </tbody>
    </table>

    <h2>Original</h2>
    <button type="button"
            class="btn btn-default t3js-record-delete"
            title="Datensatz löschen(!)"
            aria-label="Datensatz löschen(!)"
            aria-haspopup="dialog"
            data-button-ok-text="Datensatz löschen(!)"
            data-l10parent=""
            data-params="cmd[tx_seminars_seminars][5][delete]=1"
            data-message="Diesen Datensatz tatsächlich löschen? &quot;TCCD-Termin&quot; [tx_seminars_seminars:5]">
        <span class="t3js-icon icon icon-size-small icon-state-default icon-actions-edit-delete"
              data-identifier="actions-edit-delete">
            <span class="icon-markup">
                <svg class="icon-color">
                    <use
                        xlink:href="/_assets/1ee1d3e909b58d32e30dcea666dd3224/Icons/T3Icons/sprites/actions.svg#actions-delete">

                    </use>
                </svg>
            </span>
        </span>
    </button>

    <h2>Kopie</h2>
    <button type="button"
            class="btn btn-default t3js-record-delete"
            title="Anmeldung löschen"
            aria-label=""
            aria-haspopup="dialog"
            data-button-ok-text=""
            data-l10parent=""
            data-params="cmd[tx_seminars_attendances][5][delete]=1"
            data-message="Dieser Anmeldung wirklich löschen? &quot;Event with waiting list / Anna A. Attendee, 01.01.2030&quot;">
        <span class="t3js-icon icon icon-size-small icon-state-default icon-actions-delete"
              data-identifier="actions-delete">
            <span class="icon-markup">
                <svg class="icon-color">
                    <use
                        xlink:href="/_assets/1ee1d3e909b58d32e30dcea666dd3224/Icons/T3Icons/sprites/actions.svg#actions-delete">
                    </use>
                </svg>
            </span>
        </span>
    </button>
</html>
